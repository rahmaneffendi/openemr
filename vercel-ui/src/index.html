<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>OpenEMR Modern Demo</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/app-shell.css">
    <script src="/config.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main id="login-view" class="login-screen">
      <section class="login-card" aria-label="OpenEMR login">
        <div class="login-brand">
          <img src="/assets/login-primary-logo.png" alt="OpenEMR">
          <p>Modern clinical workspace prototype</p>
        </div>

        <form method="post" id="login_form" autocomplete="off" name="login_form">
          <label for="authUser">Username</label>
          <input type="text" class="form-control" id="authUser" name="authUser" value="admin">

          <label for="clearPass">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="clearPass" name="clearPass" value="pass">
            <button class="input-group-text password-toggle" id="password-toggle" type="button" aria-label="Show password">Show</button>
          </div>

          <label for="language">Language</label>
          <select class="form-control" id="language" name="languageChoice">
            <option selected>English</option>
            <option>Bahasa Indonesia</option>
          </select>

          <button id="login-button" class="btn btn-primary login-submit" type="submit">Sign in</button>
        </form>

        <p class="backend-message">Frontend-only demo. No backend or patient data is used.</p>
      </section>
    </main>

    <div id="app-view" class="modern-shell is-hidden"></div>
  </body>
</html>
